[project]
name = "neutron_star"
version = "0.1.0"
description = "Localizador e conversor de arquivos HTML de favoritos de navegadores"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Pedro Dias", email = "diaspedro.dev@gmail.com"}
]
readme = "README.md"

dependencies = [
    "beautifulsoup4>=4.12",
    "click>=8.1",
    "reportlab>=4.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.11",
    "black>=24.0",
    "mypy>=1.10",
    "pytest>=8.0",
    "pre-commit>=3.7",
]

# ═══════════════════════════════════════════════════════════
# Ferramentas
# ═══════════════════════════════════════════════════════════

[tool.ruff]
src = ["src", "tests"]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
exclude = ["tests/"]

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["src"]
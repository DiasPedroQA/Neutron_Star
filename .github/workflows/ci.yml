name: CI Multiplataforma

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --no-deps --require-hashes -r requirements-dev.lock

      - name: Lint with ruff
        run: python -m ruff check Atoms Atoms/tests

      - name: Check formatting with ruff
        run: python -m ruff format --check Atoms Atoms/tests

      - name: Type check with mypy
        run: python -m mypy Atoms

  test:
    name: Tests & Coverage
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --no-deps --require-hashes -r requirements-dev.lock

      - name: Run tests with coverage
        run: python -m pytest --cov=Atoms --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml

  security:
    name: Security Audit
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install security tools
        run: |
          python -m pip install --no-deps --require-hashes -r requirements-dev.lock

      - name: Run Bandit
        run: python -m bandit -c pyproject.toml -r Atoms

      - name: Audit dependencies for vulnerabilities
        run: python -m pip_audit -r requirements-dev.lock --progress-spinner=off

  build:
    name: Build Executable
    needs: security
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --no-deps --require-hashes -r requirements-dev.lock

      - name: Build executable
        run: python -m pyinstaller --onefile --name neutron-star Atoms/frontend/cli/main.py

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neutron-star-linux
          path: dist/neutron-star

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neutron-star-macos
          path: dist/neutron-star

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neutron-star-windows
          path: dist/neutron-star.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/neutron-star-linux/neutron-star
            artifacts/neutron-star-macos/neutron-star
            artifacts/neutron-star-windows/neutron-star.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

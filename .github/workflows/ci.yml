name: CI Multiplataforma

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache do pip para acelerar builds
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install "pip==24.0" --only-binary :all:
          pip install --only-binary :all: -r requirements-dev.txt
          pip install --no-deps --only-binary :all: -e .

      - name: Lint with ruff
        run: ruff check Atoms Atoms/tests

      - name: Check formatting with ruff
        run: ruff format --check Atoms Atoms/tests

      - name: Type check with mypy
        run: mypy Atoms

      - name: Security lint with bandit
        run: bandit -c pyproject.toml -r Atoms

      - name: Audit dependencies for vulnerabilities
        run: pip-audit -r requirements-dev.txt

      - name: Test with coverage
        run: pytest --cov=Atoms --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml

  build:
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]  # Build apenas com uma versão (evita artefatos duplicados)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install "pip==24.0" --only-binary :all:
          pip install --only-binary :all: -r requirements-dev.txt
          pip install --no-deps --only-binary :all: -e .

      - name: Build executable
        run: |
          pyinstaller --onefile --name neutron-star Atoms/frontend/cli/main.py

      - name: Upload artifact (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neutron-star-linux
          path: dist/neutron-star

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neutron-star-macos
          path: dist/neutron-star

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neutron-star-windows
          path: dist/neutron-star.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/neutron-star-linux/neutron-star
            artifacts/neutron-star-macos/neutron-star
            artifacts/neutron-star-windows/neutron-star.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: "Docs → GitHub Pages"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # FIX [AVISO]: o workflow anterior não dependia do CI.
  # Agora a documentação só é publicada se o CI-CD terminar sem erros.
  # Para referenciar jobs de outro workflow, usamos workflow_run.
  # Se preferir um fluxo mais simples, mova os jobs de docs para o ci.yml.

  build-docs:
    name: "Build Sphinx Docs"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências (inclui furo e sphinx)
        run: python -m pip install -e .[dev]

      - name: Gerar documentação Sphinx
        # FIX: diretório de saída agora é docs/_build/html (padrão Sphinx)
        run: python -m sphinx -b html docs docs/_build/html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload do artefato de páginas
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: "Deploy to GitHub Pages"
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

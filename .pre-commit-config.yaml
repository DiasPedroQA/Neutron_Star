# Configuração do pre-commit: define quais hooks serão executados
# automaticamente antes de cada commit (lint, formatação, etc.).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Substitui black e isort pelo ruff, que faz as duas coisas
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17   # use a mesma versão do seu ruff local
    hooks:
      - id: ruff-format   # equivale a "ruff format"
      - id: ruff          # equivale a "ruff check" (opcional, se quiser lint também)

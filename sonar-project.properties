# =============================================================================
# sonar-project.properties — Configuração do SonarQube / SonarCloud
# =============================================================================
#
# Como usar:
#   1. SonarCloud (recomendado para projetos open-source):
#      → Acesse https://sonarcloud.io e importe o repositório GitHub.
#      → Configure o secret SONAR_TOKEN em:
#         GitHub → Settings → Secrets → Actions → New repository secret
#      → O CI (.github/workflows/ci.yml) dispara automaticamente.
#
#   2. SonarQube local (auto-hospedado):
#      → Instale via Docker: docker run -p 9000:9000 sonarqube:community
#      → Execute: sonar-scanner -Dsonar.host.url=http://localhost:9000
#
# Documentação: https://docs.sonarsource.com/sonarcloud/
# =============================================================================

# ---------------------------------------------------------------------------
# Identificação do projeto
# ---------------------------------------------------------------------------
sonar.projectKey=DiasPedroQA_Neutron_Star
sonar.organization=diaspedroqa
sonar.projectName=Neutron Star
sonar.projectVersion=0.1.0

# ---------------------------------------------------------------------------
# Código-fonte e testes
# ---------------------------------------------------------------------------
# Diretórios com código de produção
sonar.sources=Atoms

# Diretórios com testes (excluídos da análise de duplicação e cobertura obrigatória)
sonar.tests=Atoms/tests

# Padrão para identificar arquivos de teste
sonar.test.inclusions=Atoms/tests/test_*.py

# Exclusões: venv, caches, artefatos gerados
sonar.exclusions=\
  .venv/**,\
  **/__pycache__/**,\
  **/htmlcov/**,\
  **/dist/**,\
  **/build/**,\
  docs/_build/**

# ---------------------------------------------------------------------------
# Cobertura de testes
# ---------------------------------------------------------------------------
# Aponta para o relatório gerado por pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Versão do Python (deve coincidir com requires-python no pyproject.toml)
sonar.python.version=3.10, 3.12

# ---------------------------------------------------------------------------
# Encoding
# ---------------------------------------------------------------------------
sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# Qualidade — thresholds mínimos (Quality Gate customizado)
# ---------------------------------------------------------------------------
# Esses valores são referência; o Quality Gate real é configurado na UI do Sonar.
# Deixados aqui como documentação das metas do projeto:
#   - Cobertura mínima: 80%
#   - Duplicação máxima: 3%
#   - Bugs bloqueantes: 0
#   - Vulnerabilidades críticas: 0
